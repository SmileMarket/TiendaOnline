<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmileMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" />
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    :root {
      --rosa-pastel: #F6C9DE;
      --rosa-pastel-suave: #FBE3EF;
      --rosa-acento: #E8749E;
      --rosa-acento-hover: #D65C88;
      --rosa-oscuro: #7A2E52;
      --menta: #BFE8DC;
      --menta-oscuro: #1F6F5C;
      --durazno: #FCEFD8;
      --durazno-oscuro: #8A5A0B;
      --lavanda: #E4DBF5;
      --lavanda-oscuro: #5B3E96;
      --fondo: #FAF7F8;
      --superficie: #FFFFFF;
      --borde: #ECE3E8;
      --texto: #3A3247;
      --texto-secundario: #8A8092;
    }

    body {
      font-family: 'Work Sans', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--fondo);
      color: var(--texto);
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      background: var(--rosa-pastel-suave);
      border-bottom: 1px solid var(--borde);
      z-index: 1001;
      padding: 0.5rem 1rem;
      text-align: center;
      min-height: 90px;
    }
    header img { max-width: 170px; height: auto; }

    #saludo-usuario { font-family: 'Quicksand', sans-serif; }

    #buscador-container { display: flex; justify-content: center; margin-top: 1rem; position: relative; }
    #buscador {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--borde);
      width: 80%;
      max-width: 320px;
      font-size: 0.95rem;
      font-family: 'Work Sans', sans-serif;
      background: var(--superficie);
      color: var(--texto);
    }
    #buscador:focus { outline: none; border-color: var(--rosa-acento); }
    #sugerencias {
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 360px;
      background: var(--superficie);
      border-radius: 12px;
      border: 1px solid var(--borde);
      box-shadow: 0 6px 18px rgba(122, 46, 82, 0.08);
      display: none;
      z-index: 1500;
      max-height: 300px;
      overflow-y: auto;
      padding: 6px;
    }
    .sugerencia-item { display:flex; gap:8px; align-items:center; padding:8px; border-radius:8px; cursor:pointer; }
    .sugerencia-item:hover{ background: var(--rosa-pastel-suave) }
    .sugerencia-item img{ width:46px; height:46px; object-fit:contain; background:var(--superficie); border-radius:6px; padding:4px; border: 1px solid var(--borde); }
    .sugerencia-text{ font-size:0.9rem }
    .sugerencia-precio{ font-weight:600; font-size:0.9rem; color: var(--rosa-acento-hover) }

    .container { max-width: 1100px; margin: 2rem auto; padding: 3rem 1rem 1rem; transition: padding-top 0.3s ease; }

    h2 {
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 1.3rem;
      color: var(--rosa-oscuro);
      border-bottom: none;
      border-left: 4px solid var(--rosa-acento);
      padding: 0.2rem 0 0.2rem 0.7rem;
      margin: 2rem 0 1.2rem;
    }

    .productos { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .producto {
      background: var(--superficie);
      border: 1px solid var(--borde);
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(122, 46, 82, 0.05);
      padding: 1rem;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .producto:hover { box-shadow: 0 6px 16px rgba(122, 46, 82, 0.1); transform: translateY(-2px); }
    .producto img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 0.5rem; background: var(--superficie); }
    .producto h3 { font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 1.05rem; margin: 0 0 0.3rem 0; text-align: center; color: var(--texto); }
    .categoria-texto { font-size: 0.8rem; color: var(--texto-secundario); margin-bottom: 0.3rem; text-align: center; }
    .precio { color: var(--rosa-acento-hover); font-weight: 600; font-size: 1.1rem; margin: 0.5rem 0; }

    .control-cantidad { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 0.7rem; }
    .control-cantidad button {
      width: 30px; height: 30px; border: 1px solid var(--borde); background: var(--fondo);
      font-weight: 600; font-size: 1.1rem; cursor: pointer; border-radius: 8px; color: var(--texto);
    }
    .control-cantidad input {
      width: 40px; height: 30px; text-align: center; font-size: 1rem; font-weight: 600;
      border: 1px solid var(--borde); border-radius: 8px; color: var(--texto);
    }

    .boton {
      background: var(--rosa-acento);
      border: none;
      color: white;
      padding: 0.6rem;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Work Sans', sans-serif;
      border-radius: 8px;
      width: 100%;
    }
    .boton:hover { background: var(--rosa-acento-hover); }

    .producto-imagen-container { position: relative; width: 100%; }
    .info-overlay {
      position: absolute; bottom: 8px; right: 8px;
      background: var(--rosa-acento); color: white;
      font-size: 0.7rem; padding: 4px 10px; border-radius: 999px; font-weight: 600;
    }
    .sin-stock-overlay {
      background: #E24B4A; color: white; padding: 4px 10px; border-radius: 999px;
      position: absolute; top: 10px; left: 10px; font-size: 0.75rem; font-weight: 600; z-index: 3;
    }

    #popup {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--rosa-oscuro); color: white; padding: 1rem 2rem; border-radius: 999px;
      box-shadow: 0 4px 14px rgba(122, 46, 82, 0.25); display: none; z-index: 1000;
      font-weight: 600; font-size: 0.95rem; font-family: 'Work Sans', sans-serif;
    }

    #carrito {
      position: fixed; top: 80px; right: 20px; width: 320px; max-height: 80vh;
      background: var(--superficie); border: 1px solid var(--borde); border-radius: 14px;
      box-shadow: 0 8px 24px rgba(122, 46, 82, 0.1); padding: 1rem;
      font-family: 'Work Sans', sans-serif; font-size: 0.95rem; z-index: 2000;
      overflow-y: auto; display: none;
    }
    #carrito.mostrar { display: block; }
    #carrito h2 { margin-top: 0; border-left: none; padding-left: 0; }
    .carrito-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde); padding: 0.4rem 0; }
    .carrito-item button { background: none; border: none; color: #D65C88; font-size: 1.2rem; cursor: pointer; padding: 0; }

    #confirmar {
      margin-top: 1rem; width: 100%; background: var(--rosa-oscuro); color: white; border: none;
      padding: 0.7rem; font-weight: 600; border-radius: 8px; cursor: pointer; font-family: 'Work Sans', sans-serif;
    }
    #confirmar:hover { background: #5F2340; }
    #cerrar-carrito { position: absolute; top: 6px; right: 10px; font-size: 1.4rem; background: none; border: none; color: var(--texto-secundario); cursor: pointer; }

    .float-button {
      position: fixed; right: 15px; width: 50px; height: 50px; padding: 10px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      box-shadow: 0 4px 10px rgba(122, 46, 82, 0.15); transition: transform 0.2s ease, box-shadow 0.2s ease; z-index: 998;
    }
    .float-button:hover { transform: scale(1.08); box-shadow: 0 6px 16px rgba(122, 46, 82, 0.22); }
    .carrito-float { top: 50%; background: var(--superficie); border: 1px solid var(--rosa-acento); color: var(--rosa-acento); }
    .whatsapp-float { top: calc(50% - 60px); background: #25d366; border: 1px solid #25d366; }
    .whatsapp-float svg { width: 26px; height: 26px; fill: white; }
    .instagram-float { top: calc(50% + 60px); background: var(--superficie); border: 1px solid #E1306C; }
    .carrito-float svg { width: 22px; height: 22px; }
    #contador-carrito { position: absolute; top: -4px; right: -4px; background: var(--rosa-acento-hover); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 999px; font-weight: 600; }

    #ir-arriba {
      position: fixed; bottom: 20px; right: 20px; background: var(--rosa-acento); color: white;
      font-size: 1.3rem; padding: 10px 14px; border-radius: 50%; cursor: pointer;
      box-shadow: 0 4px 10px rgba(122, 46, 82, 0.2); z-index: 999; display: none;
    }

    @keyframes vibrar { 0% { transform: translate(0); } 25% { transform: translate(-2px, 2px); } 50% { transform: translate(2px, -2px); } 75% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
    .vibrar { animation: vibrar 0.3s ease; }

    .etiquetas { display:flex; gap:6px; margin:0.4rem 0; flex-wrap: wrap; justify-content: center; }
    .etiqueta{ padding:4px 10px; border-radius:999px; font-size:0.7rem; font-weight:600; font-family: 'Work Sans', sans-serif; }
    .etiqueta.nuevo{ background: var(--menta); color: var(--menta-oscuro); }
    .etiqueta.masvendido{ background: var(--durazno); color: var(--durazno-oscuro); }
    .etiqueta.recomendado{ background: var(--lavanda); color: var(--lavanda-oscuro); }

    @media (max-width: 768px) {
      header img { max-width: 160px; }
      .producto { width: 45%; }
      #carrito { top: auto; left: 0; right: 0; bottom: 0; width: 100%; max-height: 80vh; border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform 300ms ease; padding-bottom: 30px; }
      #carrito.mostrar { transform: translateY(0%); display:block }
    }

    #splash { position: fixed; inset:0; display:flex; align-items:center; justify-content:center; background: var(--fondo); z-index: 99999; flex-direction: column; gap:12px; font-family: 'Quicksand', sans-serif; color: var(--rosa-oscuro); font-weight: 600; }
    #barra-progreso-container{ width:80%; max-width:360px; background: var(--rosa-pastel-suave); height:8px; border-radius:999px; overflow:hidden }
    #barra-progreso{ height:100%; width:0%; background: var(--rosa-acento); transition: width 200ms linear }

/* ============================= */
/* MODAL CHECKOUT PRO */
/* ============================= */

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(58, 50, 71, 0.55);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.modal-checkout{
  background: var(--superficie);
  width:95%;
  max-width:420px;
  max-height:90vh;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  font-family: 'Work Sans', sans-serif;
}

/* HEADER */

.modal-header{
  padding:16px;
  border-bottom:1px solid var(--borde);
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: var(--rosa-pastel-suave);
}

.modal-header h2{
  margin:0;
  font-size:1.15rem;
  border-left: none;
  padding: 0;
  color: var(--rosa-oscuro);
}

.modal-cerrar{
  border:none;
  background:none;
  font-size:1.4rem;
  cursor:pointer;
  color: var(--texto-secundario);
}

/* BODY */

.modal-body{
  padding:16px;
  overflow-y:auto;
  flex:1;
}

/* LISTA PRODUCTOS */

.checkout-items{
  max-height:220px;
  overflow-y:auto;
  border-bottom:1px solid var(--borde);
  margin-bottom:15px;
  padding-bottom:10px;
}

.checkout-items div{
  font-size:0.9rem;
  margin-bottom:4px;
}

/* FORM */

.checkout-form label{
  font-weight:600;
  font-size:0.85rem;
  margin-top:10px;
  display:block;
  color: var(--texto);
}

.checkout-form input{
  width:100%;
  padding:9px;
  border:1px solid var(--borde);
  border-radius:8px;
  margin-top:4px;
  margin-bottom:10px;
  font-family: 'Work Sans', sans-serif;
  color: var(--texto);
}
.checkout-form input:focus { outline: none; border-color: var(--rosa-acento); }

.cupon-feedback{
  font-size:0.85rem;
  margin-top:4px;
}

/* FOOTER */

.modal-footer{
  padding:14px;
  border-top:1px solid var(--borde);
  display:flex;
  flex-direction:column;
  gap:8px;
  background: var(--fondo);
}

/* BOTONES */

.boton{
  border:none;
  padding:10px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  font-family: 'Work Sans', sans-serif;
}

.boton-secundario{
  background: var(--menta);
  color: var(--menta-oscuro);
}
.boton-secundario:hover { background: #A8DDC9; }

.boton-whatsapp{
  background:#25d366;
  color:white;
}

.boton-gris{
  background: var(--fondo);
  border: 1px solid var(--borde);
  color: var(--texto);
}
/* TOTAL GRANDE CHECKOUT */

.checkout-total{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:1.1rem;
  font-weight:600;
  margin-bottom:10px;
  padding-bottom:8px;
  border-bottom:1px solid var(--borde);
}

.checkout-total strong{
  color: var(--rosa-acento-hover);
  font-size:1.4rem;
}

/* MOBILE */

@media (max-width:600px){

  .modal-checkout{
    width:100%;
    height:95vh;
    max-height:none;
    border-radius:16px 16px 0 0;
  }
/* ANIMACION MODAL */

.modal-checkout{
  animation: modalSlide 0.35s ease;
}

@keyframes modalSlide{

  from{
    transform:translateY(40px);
    opacity:0;
  }

  to{
    transform:translateY(0);
    opacity:1;
  }

}
}

  </style>
</head>
<body>

  <div id="splash">
    <div><strong>Cargando…</strong></div>
    <div id="barra-progreso-container"><div id="barra-progreso"></div></div>
  </div>

  <header id="main-header">
    <img src="img/Logo_transparente.png" alt="Logo SmileMarket" />
    
    <!-- ✅ Saludo personalizado -->
    <div id="saludo-usuario" style="margin-top:6px; font-weight:600; color:var(--rosa-oscuro);"></div>

    <div id="buscador-container">
      <input type="text" id="buscador" placeholder="Buscar productos..." autocomplete="off" />
      <div id="sugerencias" aria-hidden="true"></div>
    </div>
  </header>

  <div class="container">
    <h2>Productos</h2>
    <div id="productos" class="productos"></div>
  </div>

  <div id="carrito">
    <button id="cerrar-carrito">&times;</button>
    <h2>Carrito</h2>
    <div id="carrito-items"></div>
    <div id="total">Total: $0</div>
    <button id="confirmar">Confirmar compra</button>
  </div>

  <div id="popup">Producto agregado al carrito</div>

  <div id="resumen-modal" class="modal-overlay">

  <div class="modal-checkout">

    <div class="modal-header">
      <h2>Resumen de tu pedido</h2>
      <button onclick="document.getElementById('resumen-modal').style.display='none'" class="modal-cerrar">✕</button>
    </div>

    <div class="modal-body">

     <div id="numero-pedido" style="font-weight:600; margin-bottom:10px; color:var(--rosa-oscuro);"></div>
<div id="resumen-contenido" style="margin-bottom:1rem;"></div>

      <div class="checkout-form">

        <label>Tu nombre</label>
        <input type="text" id="nombre-cliente" placeholder="Ingresá tu nombre">

        <label>Código de descuento</label>
        <input type="text" id="cupon" placeholder="Ingresá tu cupón">

        <button id="aplicar-cupon" class="boton boton-secundario">
          Aplicar código
        </button>

        <div id="cupon-feedback" class="cupon-feedback"></div>

      </div>

    </div>
<div class="modal-footer">

  <div class="checkout-total">
    <span>Total</span>
    <strong id="checkout-total">$0</strong>
  </div>

  <button id="seguir-comprando" class="boton boton-gris">
    Seguir comprando
  </button>

  <button id="enviar-whatsapp" class="boton boton-whatsapp">
    Enviar pedido por WhatsApp
  </button>

</div>

  </div>

</div>

  <div id="info-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(58, 50, 71, 0.55); z-index:10000; justify-content:center; align-items:center;">
    <div style="background:var(--superficie); padding:20px; border-radius:14px; max-width:400px; width:90%; position:relative; font-family: 'Work Sans', sans-serif;">
      <button onclick="cerrarModalInfo()" style="position:absolute; top:10px; right:10px; background:none; border:none; font-size:1.5rem; cursor:pointer; color: var(--texto-secundario);">&times;</button>
      <h3 id="modal-titulo" style="font-family: 'Quicksand', sans-serif; color: var(--rosa-oscuro); margin-top: 0;"></h3>
      <p id="modal-descripcion" style="margin-top: 1rem; color: var(--texto);"></p>
    </div>
  </div>

  <a href="https://wa.me/5491130335334?text=¡Hola!%20Tengo%20una%20consulta" class="float-button whatsapp-float" target="_blank" aria-label="Escribinos por WhatsApp">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16.004 3C9.376 3 4 8.373 4 15c0 2.36.688 4.56 1.876 6.412L4 29l7.788-2.04A11.94 11.94 0 0 0 16.004 27C22.63 27 28 21.627 28 15S22.63 3 16.004 3zm6.994 16.994c-.3.84-1.49 1.55-2.44 1.75-.65.14-1.5.25-4.36-.94-3.66-1.51-6.02-5.22-6.2-5.46-.18-.24-1.48-1.97-1.48-3.76 0-1.79.93-2.67 1.27-3.03.34-.36.74-.45 1-.45.24 0 .48 0 .69.01.22.01.52-.08.81.62.3.72 1.02 2.5 1.11 2.68.09.18.15.4.03.64-.12.24-.18.4-.36.61-.18.21-.38.47-.55.63-.18.18-.37.37-.16.73.21.36.94 1.55 2.02 2.51 1.39 1.24 2.56 1.63 2.92 1.81.36.18.57.15.78-.09.21-.24.9-1.05 1.14-1.41.24-.36.48-.3.81-.18.33.12 2.1.99 2.46 1.17.36.18.6.27.69.42.09.15.09.87-.21 1.71z"/></svg>
  </a>

  <a href="#carrito" class="float-button carrito-float" id="carrito-icono">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-shopping-cart">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span id="contador-carrito">0</span>
  </a>

  <a href="https://www.instagram.com/smilemarket.ar" target="_blank" class="float-button instagram-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram" width="24" height="24" />
  </a>

  <div id="ir-arriba" title="Volver arriba">⬆</div>

<script src="main.js?v=3"></script>

  <script>
    const irArriba = document.getElementById('ir-arriba');
    window.addEventListener('scroll', () => {
      irArriba.style.display = window.scrollY > 300 ? 'block' : 'none';
    }, { passive: true });
    irArriba?.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    document.getElementById('cerrar-carrito')?.addEventListener('click', () => {
      document.getElementById('carrito')?.classList.remove('mostrar');
    });
    document.getElementById('seguir-comprando')?.addEventListener('click', () => {
      document.getElementById('resumen-modal').style.display = 'none';
    });
  </script>

</body>
</html>
